spring:
  datasource:
    url: jdbc:h2:mem:aln_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc.time_zone: UTC

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:7b

  h2:
    console:
      enabled: false

security:
  jwt:
    secret: test-secret-key-for-jwt-at-least-32-bytes
    issuer: aln-test
    access-ttl: 900s
    refresh-ttl: 7d
