<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | Adaptive Learning Navigator</title>
    <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>
<div class="app-shell">
    <aside class="app-sidebar">
        <div class="sidebar-head">
            <a class="brand" href="/dashboard">
                <span class="brand-mark">ALN</span>
                <span class="brand-copy">
                    <strong>Adaptive Learning Navigator</strong>
                </span>
            </a>
            <button class="sidebar-toggle" data-sidebar-toggle type="button" aria-expanded="true" aria-label="Свернуть боковую панель"><<</button>
        </div>

        <nav class="sidebar-nav">
            <a class="sidebar-link" data-nav="dashboard" data-short="Кат." href="/dashboard"><span>Каталог</span></a>
            <a class="sidebar-link" data-nav="plan" data-short="План" href="/plan"><span>План</span></a>
            <a class="sidebar-link" data-nav="progress" data-short="Прогр." href="/progress"><span>Прогресс</span></a>
            <a class="sidebar-link" data-nav="profile" data-short="Проф." href="/profile"><span>Профиль</span></a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-pill">
                <strong data-user-name>Пользователь</strong>
                <span data-user-email>user@example.com</span>
            </div>
            <button class="button button-secondary" data-logout type="button">Выйти</button>
        </div>
    </aside>

    <div class="app-main">
        <header class="app-topbar">
            <div>
                <h1>Профиль и история работы</h1>
            </div>
        </header>

        <main class="app-content">
            <section id="profile-info"></section>

            <section class="card panel-card">
                <p class="eyebrow">Мои планы</p>
                <h3>Сохранённые weekly plan</h3>
                <div id="profile-plans" class="panel-top-gap"></div>
            </section>

        </main>
    </div>
</div>

<script type="module" src="/assets/js/pages/profile.js"></script>
</body>
</html>
