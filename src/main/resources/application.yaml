spring:
  application:
    name: aln

  ai:
    retry:
      max-attempts: 1
      backoff:
        initial-interval: 200ms
        multiplier: 1
        max-interval: 200ms
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:7b

  datasource:
    # H2 in PostgreSQL compatibility mode for local development
    url: jdbc:h2:file:./db/aln_db;AUTO_SERVER=TRUE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: aln
    password: aln
    driver-class-name: org.h2.Driver

  sql:
    init:
      # Dev mode: schema.sql recreates the schema on every application start.
      # Switch to never if you want to keep local data between restarts.
      mode: never
      schema-locations: classpath:schema.sql

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false

---
security:
  jwt:
    secret: ${JWT_SECRET:change-me-dev-secret-at-least-32-bytes-long}
    issuer: aln
    access-ttl: 900s
    refresh-ttl: 7d

---
server:
  port: 8080

app:
  browser:
    auto-open: true
    url-path: /
  roadmap-sh:
    bootstrap:
      enabled: false
      catalog-sync: false
      roadmap-sync: true
    catalog-sync:
      enabled: false
      catalog-location: classpath:roadmap-sh/catalog.json
      default-status: DRAFT
      update-existing: true
    roadmap-sync:
      enabled: false
      manifest-pattern: file:./src/main/resources/roadmap-sh/roadmaps/*.json,classpath*:roadmap-sh/roadmaps/*.json
      update-existing: true
